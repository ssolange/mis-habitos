<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mis Hábitos</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0c0b12;
    --surface: #16141f;
    --surface2: #1e1c2a;
    --border: #2a2838;
    --border2: #3a3850;
    --text: #ede9ff;
    --text2: #8b87a8;
    --text3: #4e4b68;
    --accent: #7c6af7;
    --accent-dim: #1e1a33;
    --accent-light: #a593ff;
    --fire: #f59e0b;
    --success: #34d399;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none;
    z-index:0;
    opacity:0.4;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 16px 100px;
    position: relative;
    z-index: 1;
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .header h1 { font-size: 30px; font-weight: 600; color: #fff; letter-spacing: -0.5px; line-height: 1.1; }
  .header p { font-size: 15px; color: var(--text2); margin-top: 3px; }
  .date-pill {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    color: var(--text2);
    white-space: nowrap;
  }

  .week-strip {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    overflow-x: auto;
    padding-bottom: 4px;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .week-strip::-webkit-scrollbar { display: none; }
  .day-btn {
    flex: 1;
    min-width: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px 4px 8px;
    border-radius: 14px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    cursor: default;
  }
  .day-btn.today { border-color: var(--accent); background: var(--accent-dim); }
  .day-name { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; }
  .day-btn.today .day-name { color: var(--accent-light); }
  .day-num { font-size: 20px; font-weight: 500; color: var(--text2); }
  .day-btn.today .day-num { color: #fff; }
  .day-dot { width: 5px; height: 5px; border-radius: 50%; background: transparent; }
  .day-btn.has-data .day-dot { background: var(--accent); }

  .progress-wrap { margin-bottom: 20px; }
  .progress-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .section-label { font-size: 12px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; }
  .pct { font-size: 15px; font-weight: 500; color: var(--text2); }
  .bar-bg { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: 14px; padding: 14px 10px; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 600; color: #fff; line-height: 1; margin-bottom: 5px; }
  .stat.purple .stat-val { color: var(--accent-light); }
  .stat.gold .stat-val { color: var(--fire); }
  .stat-lbl { font-size: 12px; color: var(--text3); }

  .habits-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }

  .habit-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 13px;
    position: relative;
    transition: transform 0.12s, border-color 0.2s, background 0.2s, opacity 0.2s;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }
  .habit-card.done { border-color: var(--accent); background: var(--accent-dim); }
  .habit-card.dragging { opacity: 0.4; transform: scale(0.97); }
  .habit-card.drag-over { border-color: var(--accent-light); transform: scale(1.01); }

  .drag-handle {
    color: var(--text3);
    font-size: 20px;
    cursor: grab;
    flex-shrink: 0;
    padding: 4px 2px;
    touch-action: none;
  }
  .drag-handle:active { cursor: grabbing; }

  .habit-icon { width: 50px; height: 50px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
  .habit-body { flex: 1; min-width: 0; }
  .habit-name { font-size: 17px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 3px; }
  .habit-card.done .habit-name { color: var(--text3); text-decoration: line-through; }
  .habit-streak { display: inline-flex; align-items: center; gap: 4px; font-size: 14px; color: var(--fire); font-weight: 500; }
  .habit-streak i { font-size: 15px; }

  .habit-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .edit-btn, .check-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .edit-btn i { font-size: 17px; color: var(--text3); }
  .edit-btn:hover { border-color: var(--accent); }
  .edit-btn:hover i { color: var(--accent-light); }
  .check-btn i { font-size: 19px; color: transparent; }
  .habit-card.done .check-btn { background: var(--accent); border-color: var(--accent); }
  .habit-card.done .check-btn i { color: #fff; }

  .del-btn {
    position: absolute;
    top: 6px; right: 6px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--surface2);
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    padding: 0;
  }
  .habit-card:hover .del-btn { opacity: 1; }
  .del-btn i { font-size: 11px; color: var(--text3); }

  .empty { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty i { font-size: 38px; margin-bottom: 10px; display: block; opacity: 0.5; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* ── MODAL EDITAR ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 20px; }
  .modal-form { display: flex; flex-direction: column; gap: 14px; }
  .field-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 7px; }

  .add-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 18px; padding: 18px; margin-bottom: 14px; }
  .form-col { display: flex; flex-direction: column; gap: 12px; }

  input.habit-input {
    width: 100%;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 11px;
    padding: 13px 14px;
    font-size: 17px;
    color: var(--text);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  input.habit-input:focus { border-color: var(--accent); }
  input.habit-input::placeholder { color: var(--text3); }

  .emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .emo {
    width: 44px; height: 44px;
    border-radius: 11px;
    background: var(--bg);
    border: 1.5px solid transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 23px;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
  }
  .emo.sel { border-color: var(--accent); background: var(--accent-dim); }

  .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .col-opt { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: border-color 0.12s, transform 0.1s; }
  .col-opt.sel { border-color: #fff; transform: scale(1.15); }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 17px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: background 0.15s, transform 0.1s;
  }
  .submit-btn:active { background: #6b5ae6; transform: scale(0.98); }
  .submit-btn.secondary { background: var(--surface2); color: var(--text2); margin-top: 4px; }

  .habit-hist { background: var(--surface); border: 0.5px solid var(--border); border-radius: 14px; padding: 13px 14px; margin-bottom: 8px; }
  .hist-name { font-size: 15px; font-weight: 500; color: var(--text2); margin-bottom: 9px; display: flex; align-items: center; gap: 8px; }
  .mini-fire { font-size: 14px; color: var(--fire); display:flex; align-items:center; gap:3px; }
  .dots-row { display: flex; gap: 5px; }
  .dot-cell {
    flex: 1; aspect-ratio: 1; max-width: 40px;
    border-radius: 8px; background: var(--bg); border: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--text3);
  }
  .dot-cell.done-c { background: var(--accent); border-color: var(--accent); color: #fff; }

  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(12,11,18,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 0.5px solid var(--border);
    display: flex;
    justify-content: center;
    padding: 10px 0 max(16px, env(safe-area-inset-bottom));
    z-index: 200;
  }
  .tab {
    flex: 1; max-width: 130px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer;
    color: var(--text3); transition: color 0.15s;
    padding: 4px 0; font-family: inherit;
  }
  .tab.active { color: var(--accent-light); }
  .tab i { font-size: 28px; }
  .tab span { font-size: 12px; font-weight: 500; }

  .screen { display: none; }
  .screen.active { display: block; }

  @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .habit-card { animation: fadeUp 0.2s ease both; }
</style>
</head>
<body>

<div class="app">

  <!-- TODAY -->
  <div class="screen active" id="sc-today">
    <div class="header">
      <div>
        <h1>Mis Hábitos</h1>
        <p id="hdr-sub">—</p>
      </div>
      <div class="date-pill" id="hdr-date">—</div>
    </div>
    <div class="week-strip" id="week-strip"></div>
    <div class="progress-wrap">
      <div class="progress-head">
        <span class="section-label">Progreso de hoy</span>
        <span class="pct" id="pct-lbl">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="bar" style="width:0%"></div></div>
    </div>
    <div class="stats-grid">
      <div class="stat purple"><div class="stat-val" id="s-today">0/0</div><div class="stat-lbl">Hoy ✓</div></div>
      <div class="stat gold"><div class="stat-val" id="s-streak">0</div><div class="stat-lbl">Mejor racha 🔥</div></div>
      <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Total</div></div>
    </div>
    <div class="section-label" style="margin-bottom:12px">Hábitos de hoy</div>
    <div class="habits-list" id="habit-list"></div>
  </div>

  <!-- STATS -->
  <div class="screen" id="sc-stats">
    <div class="header"><div><h1>Estadísticas</h1><p>Últimos 7 días</p></div></div>
    <div class="section-label" style="margin-bottom:12px">Historial por hábito</div>
    <div id="hist-list"></div>
  </div>

  <!-- ADD -->
  <div class="screen" id="sc-add">
    <div class="header"><div><h1>Nuevo hábito</h1><p>Sin límites, es tuyo</p></div></div>
    <div class="add-card">
      <div class="form-col">
        <div>
          <div class="field-label">Nombre</div>
          <input class="habit-input" id="h-name" placeholder="Ej: Tomar agua, Leer 20 min..." maxlength="40">
        </div>
        <div>
          <div class="field-label">Ícono</div>
          <div class="emoji-grid" id="emo-pick"></div>
        </div>
        <div>
          <div class="field-label">Color</div>
          <div class="color-row" id="col-pick"></div>
        </div>
        <button class="submit-btn" onclick="addHabit()"><i class="ti ti-plus"></i> Agregar hábito</button>
      </div>
    </div>
  </div>

</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="edit-overlay" onclick="closeEdit(event)">
  <div class="modal">
    <div class="modal-title">Editar hábito</div>
    <div class="modal-form">
      <div>
        <div class="field-label">Nombre</div>
        <input class="habit-input" id="edit-name" maxlength="40">
      </div>
      <div>
        <div class="field-label">Ícono</div>
        <div class="emoji-grid" id="edit-emo-pick"></div>
      </div>
      <div>
        <div class="field-label">Color</div>
        <div class="color-row" id="edit-col-pick"></div>
      </div>
      <button class="submit-btn" onclick="saveEdit()"><i class="ti ti-check"></i> Guardar cambios</button>
      <button class="submit-btn secondary" onclick="delFromEdit()"><i class="ti ti-trash"></i> Eliminar hábito</button>
    </div>
  </div>
</div>

<nav class="tab-bar">
  <button class="tab active" id="tab-today" onclick="go('today')"><i class="ti ti-home"></i><span>Hoy</span></button>
  <button class="tab" id="tab-stats" onclick="go('stats')"><i class="ti ti-chart-bar"></i><span>Stats</span></button>
  <button class="tab" id="tab-add" onclick="go('add')"><i class="ti ti-circle-plus"></i><span>Agregar</span></button>
</nav>

<script>
const EMOJIS = ['💪','🧘','📚','💧','🏃','🥗','😴','✍️','🎯','🎸','🌿','🧹','💊','🐕','🧠','☕','🎨','🚴','🏋️','🥤'];
const COLORS = [
  {bg:'rgba(124,106,247,0.18)',accent:'#7c6af7'},
  {bg:'rgba(52,211,153,0.15)',accent:'#34d399'},
  {bg:'rgba(248,113,113,0.15)',accent:'#f87171'},
  {bg:'rgba(245,158,11,0.15)',accent:'#f59e0b'},
  {bg:'rgba(96,165,250,0.15)',accent:'#60a5fa'},
  {bg:'rgba(192,132,252,0.15)',accent:'#c084fc'},
  {bg:'rgba(251,146,60,0.15)',accent:'#fb923c'},
  {bg:'rgba(163,230,53,0.12)',accent:'#a3e635'},
];

let selEmoji = EMOJIS[0];
let selColor = 0;
let editId = null;
let editEmoji = EMOJIS[0];
let editColor = 0;
let dragSrcIdx = null;

let habits = JSON.parse(localStorage.getItem('mh_habits') || '[]');
let done = JSON.parse(localStorage.getItem('mh_done') || '{}');

function save() {
  localStorage.setItem('mh_habits', JSON.stringify(habits));
  localStorage.setItem('mh_done', JSON.stringify(done));
}

function dk(d) { return (d||new Date()).toISOString().slice(0,10); }
function today() { return dk(); }

// ── FIX 1: Racha correcta ──
// La racha se calcula sobre días ANTERIORES a hoy, no sobre el estado actual de hoy.
// Así, destildar algo de hoy no rompe lo que ya hiciste ayer.
function streak(id) {
  let s = 0;
  // Empezamos desde AYER para no depender del estado actual de hoy
  let d = new Date();
  d.setDate(d.getDate() - 1);
  for(let i = 0; i < 400; i++) {
    const k = dk(d);
    if(done[k] && done[k][id]) s++;
    else break;
    d.setDate(d.getDate() - 1);
  }
  // Si hoy está completado, sumamos 1
  if(done[today()] && done[today()][id]) s++;
  return s;
}

function bestStreak() {
  if(!habits.length) return 0;
  return Math.max(...habits.map(h => streak(h.id)));
}

function renderHeader() {
  const DAYS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const n = new Date();
  document.getElementById('hdr-sub').textContent = DAYS[n.getDay()];
  document.getElementById('hdr-date').textContent = `${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
}

function renderWeek() {
  const el = document.getElementById('week-strip');
  const DNAMES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  el.innerHTML = '';
  const n = new Date();
  for(let i=6;i>=0;i--){
    const d = new Date(n); d.setDate(n.getDate()-i);
    const k = dk(d);
    const isT = i===0;
    const has = done[k] && Object.values(done[k]).some(v=>v);
    el.innerHTML += `<div class="day-btn${isT?' today':''}${has?' has-data':''}">
      <span class="day-name">${DNAMES[d.getDay()]}</span>
      <span class="day-num">${d.getDate()}</span>
      <div class="day-dot"></div>
    </div>`;
  }
}

function renderHabits() {
  const el = document.getElementById('habit-list');
  const t = today();
  if(!done[t]) done[t]={};

  if(!habits.length){
    el.innerHTML='<div class="empty"><i class="ti ti-leaf"></i><p>Aún no tenés hábitos.<br>¡Tocá "Agregar" para empezar!</p></div>';
    updateStats(); return;
  }

  el.innerHTML = habits.map((h,idx) => {
    const isDone = !!done[t][h.id];
    const s = streak(h.id);
    return `<div class="habit-card${isDone?' done':''}" style="animation-delay:${idx*0.04}s" data-idx="${idx}">
      <div class="drag-handle" data-idx="${idx}"><i class="ti ti-grip-vertical"></i></div>
      <div class="habit-icon" style="background:${COLORS[h.color].bg}">${h.emoji}</div>
      <div class="habit-body">
        <div class="habit-name">${h.name}</div>
        ${s>0?`<span class="habit-streak"><i class="ti ti-flame"></i>${s} ${s===1?'día':'días'}</span>`:''}
      </div>
      <div class="habit-actions">
        <button class="edit-btn" onclick="openEdit('${h.id}')"><i class="ti ti-pencil"></i></button>
        <button class="check-btn" onclick="toggle('${h.id}')"><i class="ti ti-check"></i></button>
      </div>
      <button class="del-btn" onclick="del('${h.id}')"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');

  initDragAndDrop();
  updateStats();
}

// ── FIX 2: Reinicio diario ──
// Guardamos la última fecha de apertura. Si es un día nuevo, NO borramos los datos
// (los datos históricos se conservan), simplemente los checks de hoy empiezan vacíos.
function checkDailyReset() {
  const lastOpen = localStorage.getItem('mh_last_open');
  const t = today();
  if(lastOpen !== t) {
    // Nuevo día: inicializamos el objeto de hoy vacío si no existe
    if(!done[t]) done[t] = {};
    localStorage.setItem('mh_last_open', t);
    save();
  }
}

function toggle(id) {
  const t = today();
  if(!done[t]) done[t]={};
  done[t][id] = !done[t][id];
  save();
  renderHabits();
  renderWeek();
}

function del(id) {
  if(!confirm('¿Eliminar este hábito?')) return;
  habits = habits.filter(h=>h.id!==id);
  save();
  renderHabits();
  renderStats();
}

function updateStats() {
  const t = today();
  const total = habits.length;
  const doneCount = habits.filter(h=>done[t]&&done[t][h.id]).length;
  const pct = total>0 ? Math.round(doneCount/total*100) : 0;
  document.getElementById('s-today').textContent = `${doneCount}/${total}`;
  document.getElementById('s-streak').textContent = bestStreak();
  document.getElementById('s-total').textContent = total;
  document.getElementById('pct-lbl').textContent = pct+'%';
  document.getElementById('bar').style.width = pct+'%';
}

function renderStats() {
  const el = document.getElementById('hist-list');
  if(!habits.length){
    el.innerHTML='<div class="empty"><i class="ti ti-chart-bar"></i><p>Agregá hábitos para ver estadísticas.</p></div>';
    return;
  }
  const DNAMES=['D','L','M','X','J','V','S'];
  const n = new Date();
  const last7 = [];
  for(let i=6;i>=0;i--){const d=new Date(n);d.setDate(n.getDate()-i);last7.push(d);}

  el.innerHTML = habits.map(h => {
    const s = streak(h.id);
    const dots = last7.map(d=>{
      const k=dk(d);
      const isDone=done[k]&&done[k][h.id];
      return `<div class="dot-cell${isDone?' done-c':''}">${DNAMES[d.getDay()]}</div>`;
    }).join('');
    return `<div class="habit-hist">
      <div class="hist-name">${h.emoji} ${h.name} ${s>0?`<span class="mini-fire"><i class="ti ti-flame"></i>${s}</span>`:''}</div>
      <div class="dots-row">${dots}</div>
    </div>`;
  }).join('');
}

function addHabit() {
  const name = document.getElementById('h-name').value.trim();
  if(!name){ document.getElementById('h-name').focus(); return; }
  habits.push({ id: Date.now().toString(), name, emoji: selEmoji, color: selColor });
  save();
  document.getElementById('h-name').value='';
  renderHabits();
  renderStats();
  go('today');
}

// ── EDIT MODAL ──
function openEdit(id) {
  const h = habits.find(x=>x.id===id);
  if(!h) return;
  editId = id;
  editEmoji = h.emoji;
  editColor = h.color;
  document.getElementById('edit-name').value = h.name;
  renderEditEmojis();
  renderEditColors();
  document.getElementById('edit-overlay').classList.add('open');
}

function closeEdit(e) {
  if(e && e.target !== document.getElementById('edit-overlay')) return;
  document.getElementById('edit-overlay').classList.remove('open');
  editId = null;
}

function saveEdit() {
  if(!editId) return;
  const name = document.getElementById('edit-name').value.trim();
  if(!name) { document.getElementById('edit-name').focus(); return; }
  const idx = habits.findIndex(h=>h.id===editId);
  if(idx>=0){
    habits[idx].name = name;
    habits[idx].emoji = editEmoji;
    habits[idx].color = editColor;
  }
  save();
  renderHabits();
  renderStats();
  document.getElementById('edit-overlay').classList.remove('open');
  editId = null;
}

function delFromEdit() {
  if(!editId) return;
  if(!confirm('¿Eliminar este hábito?')) return;
  habits = habits.filter(h=>h.id!==editId);
  save();
  renderHabits();
  renderStats();
  document.getElementById('edit-overlay').classList.remove('open');
  editId = null;
}

function renderEditEmojis() {
  document.getElementById('edit-emo-pick').innerHTML = EMOJIS.map(e=>
    `<div class="emo${e===editEmoji?' sel':''}" onclick="pickEditEmoji('${e}')">${e}</div>`
  ).join('');
}

function pickEditEmoji(e) { editEmoji=e; renderEditEmojis(); }

function renderEditColors() {
  document.getElementById('edit-col-pick').innerHTML = COLORS.map((c,i)=>
    `<div class="col-opt${i===editColor?' sel':''}" style="background:${c.accent}" onclick="pickEditColor(${i})"></div>`
  ).join('');
}

function pickEditColor(i) { editColor=i; renderEditColors(); }

// ── ADD FORM PICKERS ──
function renderEmojis() {
  document.getElementById('emo-pick').innerHTML = EMOJIS.map(e=>
    `<div class="emo${e===selEmoji?' sel':''}" onclick="pickEmoji('${e}')">${e}</div>`
  ).join('');
}
function pickEmoji(e) { selEmoji=e; renderEmojis(); }
function renderColors() {
  document.getElementById('col-pick').innerHTML = COLORS.map((c,i)=>
    `<div class="col-opt${i===selColor?' sel':''}" style="background:${c.accent}" onclick="pickColor(${i})"></div>`
  ).join('');
}
function pickColor(i) { selColor=i; renderColors(); }

// ── DRAG AND DROP (touch + mouse) ──
function initDragAndDrop() {
  const cards = document.querySelectorAll('.habit-card');
  const handles = document.querySelectorAll('.drag-handle');

  handles.forEach(handle => {
    // Touch
    handle.addEventListener('touchstart', onTouchStart, {passive:false});
    // Mouse
    handle.addEventListener('mousedown', onMouseDown);
  });
}

let dragging = null;
let dragClone = null;
let dragStartY = 0;
let dragStartScrollY = 0;

function getDragIdx(e) {
  return parseInt(e.currentTarget.dataset.idx);
}

function onTouchStart(e) {
  e.preventDefault();
  const idx = parseInt(e.currentTarget.dataset.idx);
  startDrag(idx, e.touches[0].clientY);
  document.addEventListener('touchmove', onTouchMove, {passive:false});
  document.addEventListener('touchend', onTouchEnd);
}

function onMouseDown(e) {
  e.preventDefault();
  const idx = parseInt(e.currentTarget.dataset.idx);
  startDrag(idx, e.clientY);
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function startDrag(idx, clientY) {
  dragSrcIdx = idx;
  dragStartY = clientY;
  dragStartScrollY = window.scrollY;
  const card = document.querySelectorAll('.habit-card')[idx];
  card.classList.add('dragging');
  dragging = card;
}

function onTouchMove(e) {
  e.preventDefault();
  moveDrag(e.touches[0].clientY);
}
function onMouseMove(e) { moveDrag(e.clientY); }

function moveDrag(clientY) {
  if(dragSrcIdx === null) return;
  const cards = document.querySelectorAll('.habit-card');
  let targetIdx = null;
  cards.forEach((card, i) => {
    if(i === dragSrcIdx) return;
    const rect = card.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    if(clientY > rect.top && clientY < rect.bottom) {
      targetIdx = i;
    }
    card.classList.remove('drag-over');
  });
  if(targetIdx !== null) {
    cards[targetIdx].classList.add('drag-over');
  }
}

function onTouchEnd(e) {
  endDrag(e.changedTouches[0].clientY);
  document.removeEventListener('touchmove', onTouchMove);
  document.removeEventListener('touchend', onTouchEnd);
}
function onMouseUp(e) {
  endDrag(e.clientY);
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup', onMouseUp);
}

function endDrag(clientY) {
  if(dragSrcIdx === null) return;
  const cards = document.querySelectorAll('.habit-card');
  let targetIdx = null;
  cards.forEach((card, i) => {
    card.classList.remove('dragging','drag-over');
    const rect = card.getBoundingClientRect();
    if(clientY > rect.top && clientY < rect.bottom && i !== dragSrcIdx) {
      targetIdx = i;
    }
  });
  if(targetIdx !== null && targetIdx !== dragSrcIdx) {
    const moved = habits.splice(dragSrcIdx, 1)[0];
    habits.splice(targetIdx, 0, moved);
    save();
    renderHabits();
  }
  dragSrcIdx = null;
  dragging = null;
}

function go(tab) {
  ['today','stats','add'].forEach(t=>{
    document.getElementById('sc-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='stats') renderStats();
  if(tab==='today'){ renderHabits(); renderWeek(); }
}

// init
checkDailyReset();
renderHeader();
renderWeek();
renderEmojis();
renderColors();
renderHabits();
</script>
