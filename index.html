<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mis Hábitos</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0c0b12;
    --surface: #16141f;
    --surface2: #1e1c2a;
    --border: #2a2838;
    --border2: #3a3850;
    --text: #ede9ff;
    --text2: #8b87a8;
    --text3: #4e4b68;
    --accent: #7c6af7;
    --accent-dim: #1e1a33;
    --accent-light: #a593ff;
    --fire: #f59e0b;
    --success: #34d399;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* subtle noise overlay */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none;
    z-index:0;
    opacity:0.4;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 16px 100px;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .header p { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .date-pill {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }

  /* ── WEEK STRIP ── */
  .week-strip {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    overflow-x: auto;
    padding-bottom: 4px;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .week-strip::-webkit-scrollbar { display: none; }
  .day-btn {
    flex: 1;
    min-width: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px 4px 8px;
    border-radius: 14px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    cursor: default;
  }
  .day-btn.today { border-color: var(--accent); background: var(--accent-dim); }
  .day-name { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; }
  .day-btn.today .day-name { color: var(--accent-light); }
  .day-num { font-size: 17px; font-weight: 500; color: var(--text2); }
  .day-btn.today .day-num { color: #fff; }
  .day-dot { width: 5px; height: 5px; border-radius: 50%; background: transparent; }
  .day-btn.has-data .day-dot { background: var(--accent); }

  /* ── PROGRESS ── */
  .progress-wrap { margin-bottom: 20px; }
  .progress-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .section-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .pct { font-size: 13px; font-weight: 500; color: var(--text2); }
  .bar-bg {
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* ── STATS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
  }
  .stat-val {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    line-height: 1;
    margin-bottom: 5px;
  }
  .stat.purple .stat-val { color: var(--accent-light); }
  .stat.gold .stat-val { color: var(--fire); }
  .stat-lbl { font-size: 10px; color: var(--text3); }

  /* ── HABITS LIST ── */
  .habits-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }

  .habit-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 14px 14px 14px 14px;
    display: flex;
    align-items: center;
    gap: 13px;
    position: relative;
    transition: transform 0.12s, border-color 0.2s, background 0.2s;
    -webkit-user-select: none;
    user-select: none;
  }
  .habit-card.done {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .habit-card:active { transform: scale(0.98); }

  .habit-icon {
    width: 42px; height: 42px;
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .habit-body { flex: 1; min-width: 0; }
  .habit-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 3px;
  }
  .habit-card.done .habit-name { color: var(--text3); text-decoration: line-through; }
  .habit-streak {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--fire);
    font-weight: 500;
  }
  .habit-streak i { font-size: 13px; }

  .check-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .check-btn i { font-size: 15px; color: transparent; }
  .habit-card.done .check-btn {
    background: var(--accent);
    border-color: var(--accent);
  }
  .habit-card.done .check-btn i { color: #fff; }

  .del-btn {
    position: absolute;
    top: 6px; right: 6px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--surface2);
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    padding: 0;
  }
  .habit-card:hover .del-btn,
  .habit-card:focus-within .del-btn { opacity: 1; }
  .del-btn i { font-size: 11px; color: var(--text3); }

  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
  }
  .empty i { font-size: 38px; margin-bottom: 10px; display: block; opacity: 0.5; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* ── ADD FORM ── */
  .add-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 14px;
  }
  .add-card h3 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 14px;
  }
  .form-col { display: flex; flex-direction: column; gap: 12px; }
  .field-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    margin-bottom: 7px;
  }
  input.habit-input {
    width: 100%;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 11px;
    padding: 11px 14px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  input.habit-input:focus { border-color: var(--accent); }
  input.habit-input::placeholder { color: var(--text3); }

  .emoji-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .emo {
    width: 38px; height: 38px;
    border-radius: 11px;
    background: var(--bg);
    border: 1.5px solid transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
  }
  .emo.sel { border-color: var(--accent); background: var(--accent-dim); }

  .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .col-opt {
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    border: 2.5px solid transparent;
    transition: border-color 0.12s, transform 0.1s;
  }
  .col-opt.sel { border-color: #fff; transform: scale(1.15); }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: background 0.15s, transform 0.1s;
  }
  .submit-btn:active { background: #6b5ae6; transform: scale(0.98); }

  /* ── STATS SCREEN ── */
  .habit-hist {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 13px 14px;
    margin-bottom: 8px;
  }
  .hist-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 9px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mini-fire { font-size: 12px; color: var(--fire); display:flex; align-items:center; gap:3px; }
  .dots-row { display: flex; gap: 5px; }
  .dot-cell {
    flex: 1;
    aspect-ratio: 1;
    max-width: 36px;
    border-radius: 8px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text3);
  }
  .dot-cell.done-c { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── TAB BAR ── */
  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(12,11,18,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 0.5px solid var(--border);
    display: flex;
    justify-content: center;
    padding: 10px 0 max(16px, env(safe-area-inset-bottom));
    z-index: 200;
  }
  .tab {
    flex: 1;
    max-width: 130px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    transition: color 0.15s;
    padding: 4px 0;
    font-family: inherit;
  }
  .tab.active { color: var(--accent-light); }
  .tab i { font-size: 23px; }
  .tab span { font-size: 10px; font-weight: 500; }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(8px); }
    to { opacity:1; transform: translateY(0); }
  }
  .habit-card { animation: fadeUp 0.2s ease both; }
</style>
</head>
<body>

<div class="app">

  <!-- TODAY -->
  <div class="screen active" id="sc-today">
    <div class="header">
      <div>
        <h1>Mis Hábitos</h1>
        <p id="hdr-sub">—</p>
      </div>
      <div class="date-pill" id="hdr-date">—</div>
    </div>

    <div class="week-strip" id="week-strip"></div>

    <div class="progress-wrap">
      <div class="progress-head">
        <span class="section-label">Progreso de hoy</span>
        <span class="pct" id="pct-lbl">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="bar" style="width:0%"></div></div>
    </div>

    <div class="stats-grid">
      <div class="stat purple">
        <div class="stat-val" id="s-today">0/0</div>
        <div class="stat-lbl">Hoy ✓</div>
      </div>
      <div class="stat gold">
        <div class="stat-val" id="s-streak">0</div>
        <div class="stat-lbl">Mejor racha 🔥</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="s-total">0</div>
        <div class="stat-lbl">Total</div>
      </div>
    </div>

    <div class="section-label" style="margin-bottom:12px">Hábitos de hoy</div>
    <div class="habits-list" id="habit-list"></div>
  </div>

  <!-- STATS -->
  <div class="screen" id="sc-stats">
    <div class="header">
      <div>
        <h1>Estadísticas</h1>
        <p>Últimos 7 días</p>
      </div>
    </div>
    <div class="section-label" style="margin-bottom:12px">Historial por hábito</div>
    <div id="hist-list"></div>
  </div>

  <!-- ADD -->
  <div class="screen" id="sc-add">
    <div class="header">
      <div>
        <h1>Nuevo hábito</h1>
        <p>Sin límites, es tuyo</p>
      </div>
    </div>
    <div class="add-card">
      <div class="form-col">
        <div>
          <div class="field-label">Nombre</div>
          <input class="habit-input" id="h-name" placeholder="Ej: Tomar agua, Leer 20 min..." maxlength="40">
        </div>
        <div>
          <div class="field-label">Ícono</div>
          <div class="emoji-grid" id="emo-pick"></div>
        </div>
        <div>
          <div class="field-label">Color</div>
          <div class="color-row" id="col-pick"></div>
        </div>
        <button class="submit-btn" onclick="addHabit()">
          <i class="ti ti-plus"></i> Agregar hábito
        </button>
      </div>
    </div>
  </div>

</div>

<nav class="tab-bar">
  <button class="tab active" id="tab-today" onclick="go('today')">
    <i class="ti ti-home"></i><span>Hoy</span>
  </button>
  <button class="tab" id="tab-stats" onclick="go('stats')">
    <i class="ti ti-chart-bar"></i><span>Stats</span>
  </button>
  <button class="tab" id="tab-add" onclick="go('add')">
    <i class="ti ti-circle-plus"></i><span>Agregar</span>
  </button>
</nav>

<script>
const EMOJIS = ['💪','🧘','📚','💧','🏃','🥗','😴','✍️','🎯','🎸','🌿','🧹','💊','🐕','🧠','☕','🎨','🚴','🏋️','🥤'];
const COLORS = [
  {bg:'rgba(124,106,247,0.18)',accent:'#7c6af7'},
  {bg:'rgba(52,211,153,0.15)',accent:'#34d399'},
  {bg:'rgba(248,113,113,0.15)',accent:'#f87171'},
  {bg:'rgba(245,158,11,0.15)',accent:'#f59e0b'},
  {bg:'rgba(96,165,250,0.15)',accent:'#60a5fa'},
  {bg:'rgba(192,132,252,0.15)',accent:'#c084fc'},
  {bg:'rgba(251,146,60,0.15)',accent:'#fb923c'},
  {bg:'rgba(163,230,53,0.12)',accent:'#a3e635'},
];

let selEmoji = EMOJIS[0];
let selColor = 0;
let habits = JSON.parse(localStorage.getItem('mh_habits') || '[]');
let done = JSON.parse(localStorage.getItem('mh_done') || '{}');

function save() {
  localStorage.setItem('mh_habits', JSON.stringify(habits));
  localStorage.setItem('mh_done', JSON.stringify(done));
}

function dk(d) { return (d||new Date()).toISOString().slice(0,10); }
function today() { return dk(); }

function streak(id) {
  let s = 0, d = new Date();
  for(let i=0;i<400;i++){
    const k = dk(d);
    if(done[k]&&done[k][id]) s++;
    else if(i>0) break;
    d.setDate(d.getDate()-1);
  }
  return s;
}

function bestStreak() {
  if(!habits.length) return 0;
  return Math.max(...habits.map(h=>streak(h.id)));
}

function renderHeader() {
  const DAYS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const n = new Date();
  document.getElementById('hdr-sub').textContent = DAYS[n.getDay()];
  document.getElementById('hdr-date').textContent = `${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
}

function renderWeek() {
  const el = document.getElementById('week-strip');
  const DNAMES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  el.innerHTML = '';
  const n = new Date();
  for(let i=6;i>=0;i--){
    const d = new Date(n); d.setDate(n.getDate()-i);
    const k = dk(d);
    const isT = i===0;
    const has = done[k] && Object.values(done[k]).some(v=>v);
    el.innerHTML += `<div class="day-btn${isT?' today':''}${has?' has-data':''}">
      <span class="day-name">${DNAMES[d.getDay()]}</span>
      <span class="day-num">${d.getDate()}</span>
      <div class="day-dot"></div>
    </div>`;
  }
}

function renderHabits() {
  const el = document.getElementById('habit-list');
  const t = today();
  if(!done[t]) done[t]={};

  if(!habits.length){
    el.innerHTML='<div class="empty"><i class="ti ti-leaf"></i><p>Aún no tenés hábitos.<br>¡Tocá "Agregar" para empezar!</p></div>';
    updateStats(); return;
  }

  el.innerHTML = habits.map((h,idx) => {
    const isDone = !!done[t][h.id];
    const s = streak(h.id);
    return `<div class="habit-card${isDone?' done':''}" style="animation-delay:${idx*0.04}s">
      <div class="habit-icon" style="background:${COLORS[h.color].bg}">${h.emoji}</div>
      <div class="habit-body">
        <div class="habit-name">${h.name}</div>
        ${s>0?`<span class="habit-streak"><i class="ti ti-flame"></i>${s} ${s===1?'día':'días'}</span>`:''}
      </div>
      <button class="check-btn" onclick="toggle('${h.id}')"><i class="ti ti-check"></i></button>
      <button class="del-btn" onclick="del('${h.id}')"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');

  updateStats();
}

function toggle(id) {
  const t = today();
  if(!done[t]) done[t]={};
  done[t][id] = !done[t][id];
  save();
  renderHabits();
  renderWeek();
}

function del(id) {
  if(!confirm('¿Eliminar este hábito?')) return;
  habits = habits.filter(h=>h.id!==id);
  save();
  renderHabits();
  renderStats();
}

function updateStats() {
  const t = today();
  const total = habits.length;
  const doneCount = habits.filter(h=>done[t]&&done[t][h.id]).length;
  const pct = total>0 ? Math.round(doneCount/total*100) : 0;
  document.getElementById('s-today').textContent = `${doneCount}/${total}`;
  document.getElementById('s-streak').textContent = bestStreak();
  document.getElementById('s-total').textContent = total;
  document.getElementById('pct-lbl').textContent = pct+'%';
  document.getElementById('bar').style.width = pct+'%';
}

function renderStats() {
  const el = document.getElementById('hist-list');
  if(!habits.length){
    el.innerHTML='<div class="empty"><i class="ti ti-chart-bar"></i><p>Agregá hábitos para ver estadísticas.</p></div>';
    return;
  }
  const DNAMES=['D','L','M','X','J','V','S'];
  const n = new Date();
  const last7 = [];
  for(let i=6;i>=0;i--){const d=new Date(n);d.setDate(n.getDate()-i);last7.push(d);}

  el.innerHTML = habits.map(h => {
    const s = streak(h.id);
    const dots = last7.map(d=>{
      const k=dk(d);
      const isDone=done[k]&&done[k][h.id];
      return `<div class="dot-cell${isDone?' done-c':''}">${DNAMES[d.getDay()]}</div>`;
    }).join('');
    return `<div class="habit-hist">
      <div class="hist-name">${h.emoji} ${h.name} ${s>0?`<span class="mini-fire"><i class="ti ti-flame"></i>${s}</span>`:''}</div>
      <div class="dots-row">${dots}</div>
    </div>`;
  }).join('');
}

function addHabit() {
  const name = document.getElementById('h-name').value.trim();
  if(!name){ document.getElementById('h-name').focus(); return; }
  habits.push({ id: Date.now().toString(), name, emoji: selEmoji, color: selColor });
  save();
  document.getElementById('h-name').value='';
  renderHabits();
  renderStats();
  go('today');
}

function renderEmojis() {
  document.getElementById('emo-pick').innerHTML = EMOJIS.map(e=>
    `<div class="emo${e===selEmoji?' sel':''}" onclick="pickEmoji('${e}')">${e}</div>`
  ).join('');
}

function pickEmoji(e) { selEmoji=e; renderEmojis(); }

function renderColors() {
  document.getElementById('col-pick').innerHTML = COLORS.map((c,i)=>
    `<div class="col-opt${i===selColor?' sel':''}" style="background:${c.accent}" onclick="pickColor(${i})"></div>`
  ).join('');
}

function pickColor(i) { selColor=i; renderColors(); }

function go(tab) {
  ['today','stats','add'].forEach(t=>{
    document.getElementById('sc-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='stats') renderStats();
  if(tab==='today'){ renderHabits(); renderWeek(); }
}

// init
renderHeader();
renderWeek();
renderEmojis();
renderColors();
renderHabits();
</script>
</body>
</html>
